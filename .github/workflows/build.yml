name: PawMage Windows Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          choco install make mingw-w64 innosetup -y

      - name: Build C parts
        shell: bash
        run: |
          mingw32-make -C libpawm
          mingw32-make -C pawm-convert

      - name: Generate test image and run converter
        shell: powershell
        run: |
          # Create a 1x1 red PNG using .NET's System.Drawing
          Add-Type -AssemblyName System.Drawing
          $bmp = New-Object System.Drawing.Bitmap(1, 1)
          $bmp.SetPixel(0, 0, [System.Drawing.Color]::Red)
          $bmp.Save("test.png")
          $bmp.Dispose()

          # Run the converter
          .\pawm-convert\pawm-convert.exe test.png test.pawm

          # Check if output exists
          if (Test-Path test.pawm) {
            Write-Host "✅ Converter succeeded!"
          } else {
            Write-Host "❌ Converter failed — no output file"
            exit 1
          }

      - name: Build GUI Viewer (PyInstaller)
        shell: bash
        working-directory: pawm-view
        run: |
          pip install -r requirements.txt pyinstaller
          pyinstaller --onefile --windowed --noconsole --icon=../images/ico/PawMageViewerIcon.ico viewer.py -n pawm-view

      - name: Build Inno Setup installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installers\windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: pawmage-windows
          path: installers/windows/Output/PawMage-Setup.exe