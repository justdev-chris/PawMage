<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PawMage – .pawm image format</title>
    <style>
        body {
            background: #0d0d1a;
            color: #eee;
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            line-height: 1.6;
        }
        a { color: #e94560; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .repo { background: #1a1a2e; padding: 1.5rem; border-radius: 12px; border-left: 4px solid #e94560; }
        .badge { display: inline-block; background: #e94560; color: #fff; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; }
        h1 { font-size: 2.8rem; margin-bottom: 0.2rem; }
        .sub { color: #888; margin-top: 0; }
        .footer { margin-top: 3rem; color: #555; font-size: 0.9rem; }
        iframe { width: 100%; height: 400px; border: 1px solid #2a2a4a; border-radius: 12px; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <h1>🐱 PawMage</h1>
    <p class="sub"><span class="badge">.pawm</span> – simple, lossless image format with metadata</p>

    <div class="repo">
        <p><strong>Build once, use everywhere.</strong></p>
        <p>
            C library · CLI converter · Python GUI · JavaScript web decoder<br />
            <a href="https://github.com/justchrisdevmeow/PawMage">→ GitHub Repository</a>
        </p>
    </div>

    <h2>Live Web Demo</h2>
    <p>Drag & drop a <code>.pawm</code> file into the viewer below:</p>
    <iframe src="pawm-js/demo.html"></iframe>

    <div class="footer">
        MIT &middot; built by <a href="https://github.com/justchrisdevmeow">justchrisdevmeow</a> &middot; 🐱
    </div>
</body>
</html>
